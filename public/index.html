<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Items</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/4.12.1/firebase.js"></script>
  <script src="https://www.gstatic.com/firebasejs/4.12.1/firebase-firestore.js"></script>
</head>

<body>
  <header>
    <img src="./media/Logo2 SomNeteja.png" alt="SomNeteja logo" id="logo_header">
    
    <nav>
      <a href="#listProducts" onclick="">Botiga</a>
      <a href="#listComarques" onclick="">Comarques</a>
    </nav>
  </header>
  <div class="container p-5">
    <div class="row">
      <div class="col-8 offset-2" id="loginForm">
        <form>
          <div class="form-group row">
            <label for="title" class="col-4 col-form-label">Correu electrònic:</label>
            <div class="col-8">
              <input type="email" class="form-control" id="loginEmail" />
            </div>
          </div>
          <div class="form-group row">
            <label for="content" class="col-4 col-form-label">Contrasenya:</label>
            <div class="col-8">
              <input type="password" class="form-control" id="loginPassword" />
            </div>
          </div>
          <div class="form-group row">
            <div class="offset-4 col-8">
              <button type="button" id="newUser" class="btn btn-outline-primary float-right">
                Registrar un nou usuari
              </button>
              <button type="button" id="login" class="btn btn-default float-right mr-3">
                Entrar
              </button>
            </div>
          </div>
        </form>
      </div>

      <div class="col-8 offset-2" id="signupForm" style="display: none">
        <form>
          <div class="form-group row">
            <label class="col-4 col-form-label">Nom:</label>
            <div class="col-8">
              <input type="text" class="form-control" id="signupNom" />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-4 col-form-label">Cognom:</label>
            <div class="col-8">
              <input type="text" class="form-control" id="signupCognom" />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-4 col-form-label">Telèfon:</label>
            <div class="col-8">
              <input type="text" class="form-control" id="signupTelefon" />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-4 col-form-label">Correu electrònic:</label>
            <div class="col-8">
              <input type="email" class="form-control" id="signupEmail" />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-4 col-form-label">Contrasenya:</label>
            <div class="col-8">
              <input type="password" class="form-control" id="signupPassword" />
            </div>
          </div>
          <div class="form-group row">
            <label class="col-4 col-form-label">Confirmar contrasenya:</label>
            <div class="col-8">
              <input type="password" class="form-control" id="signupPasswordConfirm" />
            </div>
          </div>
          <div class="form-group row">
            <div class="offset-4 col-8">
              <button type="button" id="signup" class="btn btn-default float-right">
                Enviar
              </button>
            </div>
          </div>
        </form>
      </div>

      <div class="col-8 offset-2" id="itemsForm" style="display: none">
        <form>
          <div class="form-group row">
            <label for="title" class="col-4 col-form-label">Títol:</label>
            <div class="col-8">
              <input type="text" class="form-control" id="title" />
            </div>
          </div>
          <div class="form-group row">
            <label for="content" class="col-4 col-form-label">Contingut:</label>
            <div class="col-8">
              <input type="text" class="form-control" id="content" />
            </div>
          </div>
          <div class="form-group row">
            <div class="offset-4 col-8">
              <button type="button" id="save" class="btn btn-default float-right">
                Guardar
              </button>
            </div>
          </div>
          <input type="hidden" id="elementId" />
        </form>
      </div>

      <div class="col-2">
        <div id="alert" role="alert"></div>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-hover" id="listProducts" style="display: none"></table>
    </div>
    <div class="table-responsive">
      <table class="table table-hover" id="listComarques" style="display: none"></table>
    </div>
  </div>
</body>
<script language="javascript" src="js/config.js"></script>
<script language="javascript" src="js/firestore.js"></script>
<script language="javascript" src="js/users.js"></script>
<script language="javascript" src="js/products.js"></script>
<script language="javascript">

  let currentUser;
  let userId;
  let userPoints;
  // Funció per mostrar alertes a la UI
  function showAlert(text, type) {
    // Modifiquem el text i la classe CSS segons el tipus d'alerta
    const alertEl = document.getElementById("alert");
    alertEl.innerText = text;
    alertEl.className = `alert ${type}`;
    alertEl.style.display = "block";

    // Disparem un temporitzador per ocultar l'alerta a 2 segons
    setTimeout(() => {
      alertEl.style.display = "none";
    }, 2000);
  }

  // Quan la pàgina hagi carregat completament, carreguem els ítems
  window.addEventListener("load", async () => {
    await loadProducts(); // Carrega i mostra la llista d'ítems
    
  });

  // Handler per a l'inici de sessió
  document.getElementById("login").addEventListener("click", async () => {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  try {
    // Intentar login
    await auth.signInWithEmailAndPassword(email, password);

    // Esperar a que Firebase actualice el estado
    firebase.auth().onAuthStateChanged(async user => {
      if (user) {
        userId = user.uid;
        currentUser = user;

        // Mostramos UI
        showAlert("Usuari autenticat", "alert-success");
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("itemsForm").style.display = "block";
        document.getElementById("listProducts").style.display = "table";
        document.getElementById("listComarques").style.display = "table";

        // Cargar los datos del usuario
        const userDoc = await db.collection("usuaris").doc(userId).get();
        userPoints = userDoc.data().punts;

        // Cargar las comarcas
        await loadComarques();
      }
    });
  } catch (error) {
    showAlert("Error d’autenticació", "alert-danger");
    console.error(error);
  }
});

  // Handler per mostrar el formulari de registre d'usuari nou
  document.getElementById("newUser").addEventListener("click", () => {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("signupForm").style.display = "block";
  });

  // Handler per al registre d'un nou usuari
  document.getElementById("signup").addEventListener("click", async () => {
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;
    const passwordConfirm = document.getElementById("signupPasswordConfirm").value;
    const telefon = document.getElementById("signupTelefon").value;
    const nom = document.getElementById("signupNom").value;
    const cognom = document.getElementById("signupCognom").value;

    // Validaciones básicas
    if (!email || email.indexOf("@") < 1) {
      showAlert("Email incorrecte", "alert-danger");
      return;
    }
    if (!password || password.length < 8) {
      showAlert("La contrasenya ha de tenir almenys 8 caràcters", "alert-danger");
      return;
    }
    if (password !== passwordConfirm) {
      showAlert("Les contrasenyes no coincideixen", "alert-danger");
      return;
    }

    try {
      // Crear usuario en Firebase Auth
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      // const user = userCredential.user;
      const user = auth.currentUser;
      userId = user.uid;
      

      if (!user) {
        showAlert("Error: No s'ha pogut obtenir l'usuari de Firebase", "alert-danger");
        return;
      }
      // Crear documento en Firestore
      await addUser(user, { telefon, nom, cognom });

      const userDoc = await db.collection("users").doc(userId).get();
      userPoints = userDoc.data().punts;
      showAlert("Usuari creat correctament", "alert-success");

      // Torna al login
      document.getElementById("signupForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";

    } catch (error) {
      console.error(error);
      showAlert("Error al crear l'usuari: " + error.message, "alert-danger");
    }
  });

  // Handler per guardar o actualitzar un ítem
  document.getElementById("save").addEventListener("click", async () => {
    // Obtenim valors del formulari
    const id = document.getElementById("elementId").value;
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;
    const doc = { title, content }; // Objecte amb les dades a desar

    if (!id) {
      // Si no hi ha ID, afegim un nou ítem
      await addItem(doc);
    } else {
      // Si hi ha ID, actualitzem l'ítem existent
      await updateItem(id, doc);
    }
  });

</script>

</html>
